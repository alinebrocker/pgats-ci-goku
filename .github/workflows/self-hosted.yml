name: Self Hosted Test

on:
  workflow_dispatch:

jobs:
    e2e-tests:
        runs-on: 
         - self-hosted
         - Windows
         - X64

        steps:
            # checkout do código - clone
            - name: Checkout repository
              uses: actions/checkout@v4

            # setup Node + cache
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  cache: yarn
            
            # instalar Yarn
            - name: Enable Yarn
              run: corepack enable

            # instalar dependências (mais seguro em CI)
            - name: Install dependencies
              run: yarn install --frozen-lockfile
            
            # instalação dos Browsers do Playwright
            - name: Instalando Browsers do Playwright
              run: yarn playwright install
            
            # executar os testes e2e
            - name: Executando testes e2e
              run: yarn run e2e
            
            # publicar relatório do Playwright
            - name: Publicando relatório Playwright
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

            #upload de screenshots em caso de falha      
            - name: Upload screenshots (on failure)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: screenshots
                  path: test-results/

            # install Allure CLI
            - name: Install Allure CLI
              if: always()
              run: npm install -g allure-commandline

             # gerar report Allure
            - name: Generate Allure report
              if: always()
              run: npx allure generate allure-results -o allure-report --clean
            
            # upload Allure report
            - name: Upload Allure report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: allure-report
                path: allure-report/